<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="icon" href="login icon.jpg" type="image/png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
        
        <div class="login" id="login">
        <h1>Faça seu login</h1>
        <input id="nome" type="text" placeholder="Usuário"><br>
        <input id="senhas" type="password" placeholder="Senha"><br>
        <button onclick="validarUsuario()">Confirmar</button>
        </div>
<script>
    function validarUsuario(){
        let usuario = document.getElementById("nome").value;
        let senha = document.getElementById("senhas").value;

        if(usuario === "admin" && senha === "1234"){
            window.location.href = "questionario.html";
        }else{
            alert("Usuário ou Senha INCORRETA");
            senhas.value=""
            nome.value=""
        }
}
</script>

</body>
</html>
